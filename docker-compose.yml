services:
  postgres:
    image: postgres:16
    container_name: video_agent_postgres
    environment:
      POSTGRES_USER: video_agent
      POSTGRES_PASSWORD: video_agent
      POSTGRES_DB: video_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: video_agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
